services:
  - type: web
    name: warehouse-api
    env: dotnet
    buildCommand: dotnet publish -c Release -o ./out
    startCommand: dotnet ./out/WarehouseAPI.dll
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false  # Set this in Render dashboard with your SQL Server connection string
    healthCheckPath: /api/products
    autoDeploy: true
